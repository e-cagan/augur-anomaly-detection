# Full AUGUR stack: backend + frontend + monitoring (Prometheus + Grafana).
#
# Run from the repo root:
#     docker compose -f docker/docker-compose.yml up --build
#
# Endpoints:
#     http://localhost:8080   frontend (the app)
#     http://localhost:9090   Prometheus (raw metrics / queries)
#     http://localhost:3000   Grafana (dashboards) — login admin / admin

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: augur-backend
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: augur-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"               # Prometheus UI (optional, for raw queries)
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"               # Grafana UI
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped