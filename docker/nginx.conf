# nginx config for the AUGUR frontend container.
# Serves the built static site AND reverse-proxies /api/* to the backend,
# so the browser only ever talks to one origin (no CORS needed in this mode).

server {
    listen 80;
    server_name _;

    # Allow large video uploads (default is 1MB, way too small for video)
    client_max_body_size 200M;

    # Static frontend (the built Vite bundle)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA fallback: any unknown path serves index.html
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: /api/predict -> backend:8000/predict
    # The trailing slash on both sides strips the /api prefix.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Video inference can take a few seconds — raise timeouts
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}